<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anh Yêu Em</title>
<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  color: white;
}

/* Trái tim lớn ở giữa */
.big-heart {
  position: absolute;
  font-size: 120px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* Chữ ở giữa */
.message {
  position: absolute;
  text-align: center;
  font-size: 40px;
  z-index: 2;
  animation: fadeIn 3s forwards;
  opacity: 0;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* Tim rơi */
.falling-heart {
  position: absolute;
  top: -10px;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}

/* Tim xoay vòng */
.circle {
  position: absolute;
  width: 300px;
  height: 300px;
  animation: rotate 10s linear infinite;
}

.circle span {
  position: absolute;
  font-size: 25px;
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="big-heart">❤️</div>

<div class="message">
  Anh yêu em<br>
  <b>Bé Nguyên iuu dấu</b>
</div>

<div class="circle">
  <span style="top:0; left:130px;">💖</span>
  <span style="top:130px; left:0;">💗</span>
  <span style="bottom:0; left:130px;">💘</span>
  <span style="top:130px; right:0;">💞</span>
</div>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("falling-heart");
  heart.innerHTML = "💗";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 200);
</script>

</body>
</html>
